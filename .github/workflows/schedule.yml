name: Daily MTF Tracker

on:
  schedule:
    # This runs at 13:00 UTC every day, which is 6:30 PM IST in India.
    # We set it to 6:30 PM because NSE is often late publishing the 6:00 PM report.
    - cron: '0 13 * * *'
  
  # This line allows you to click a button and run it manually whenever you want!
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Run MTF Analyzer Script
        run: python mtf_bot.py

      - name: Upload the Excel/CSV file to GitHub
        uses: actions/upload-artifact@v3
        with:
          name: Daily-MTF-Report
          # This tells GitHub to give you a download button for any CSV it creates
          path: "*.csv"
